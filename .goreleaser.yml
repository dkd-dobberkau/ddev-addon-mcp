version: 2

builds:
  - id: ddev-mcp-server
    dir: mcp-server
    binary: ddev-mcp-server
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: binary
    name_template: "ddev-mcp-server_{{ .Os }}_{{ .Arch }}"
